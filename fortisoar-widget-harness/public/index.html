                  msg = "lint blocked package: " + err.lint.errors.map((e) => e.code).join(", ");
                } else if (err && err.error) msg = err.error;
              } catch (_) {}
              throw new Error(msg);
            }
            const cd = r.headers.get("Content-Disposition") || "";
            const m = cd.match(/filename="([^"]+)"/);
            const filename = m ? m[1] : id + ".tgz";
            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            const newVersion = r.headers.get("X-Package-Version") || requested;
            const widgetName = id.replace(/-\d+(?:\.\d+)*$/, "");
            updateWidgetSelectId(id, widgetName + "-" + newVersion);
            pkgCurrent.textContent = newVersion;
            pkgStatus.textContent = "built " + filename;
          } catch (e) {
            pkgStatus.textContent = "failed: " + e.message;
          } finally {
            pkgBuild.disabled = false;
          }
        });

        document.getElementById("reload").addEventListener("click", () => {
          localStorage.setItem("harness.widget", widgetSelect.value);
          localStorage.setItem("harness.ctx", ctxSel.value);
          localStorage.setItem("harness.module", modEl.value);
          localStorage.setItem("harness.id", idEl.value);
          localStorage.setItem("harness.fsrCss", loadCssEl.checked ? "1" : "0");
          localStorage.setItem("harness.theme", document.getElementById("harness-theme").value);
          location.reload();
        });

        function loadScript(src) {
          return new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = src;
            s.onload = () => resolve();
            s.onerror = () => reject(new Error("failed to load " + src));
            document.head.appendChild(s);
          });
        }

        // In SOAR, window.monaco is preloaded during app bootstrap
        // (initMonacoEditorService). Our proxy forwards /node_modules/... to
        // the SOAR host, so we can load Monaco's AMD bundle the same way
        // here. Only needs to run once per tab; idempotent on repeat calls.
        async function preloadMonaco() {
          if (window.monaco) return window.monaco;
          if (window.__harnessMonacoPromise) return window.__harnessMonacoPromise;
          const VS = "/node_modules/monaco-editor/min/vs";
          window.__harnessMonacoPromise = (async () => {
            if (!window.require) await loadScript(VS + "/loader.js");
            return new Promise((resolve, reject) => {
              try {
                window.require.config({
                  paths: { vs: VS },
                  "vs/nls": { availableLanguages: {} },
                });
                window.require(
                  ["vs/editor/editor.main"],
                  () => resolve(window.monaco),
                  (err) =>
                    reject(
                      new Error(
                        "Monaco require(editor.main) failed: " +
                          ((err && (err.message || err.toString())) || "unknown")
                      )
                    )
                );
              } catch (e) {
                reject(e);
              }
            });
          })();
          return window.__harnessMonacoPromise;
        }

        async function injectFsrStylesheets(wantMonaco) {
          try {
            const r = await fetch("/_fsr/stylesheets");
            if (!r.ok) {
              console.warn("stylesheets endpoint failed:", r.status);
              return;
            }
            const { stylesheets } = await r.json();
            for (const href of stylesheets || []) {
              // The SOAR manifest includes Monaco's editor.main.css (~124 KB).
              // Skip it for widgets that don't use a code editor — it's the only
              // Monaco byte that leaks past the lazy-load gate otherwise.
              if (!wantMonaco && /monaco-editor\/.*editor\.main\.css/.test(href)) continue;
              const link = document.createElement("link");
              link.rel = "stylesheet";
              link.href = href;
              // Append to body (not head) so SOAR sheets come after the body
              // CDN vendor <link> tags (ui-grid, ui-bootstrap, etc.) in cascade
              // order — body stylesheets sort after head stylesheets in the CSSOM,
              // so head-injected SOAR sheets would lose to body CDN sheets at equal
              // specificity.  Appending to body puts SOAR CSS last, letting theme
              // overrides (e.g. steel.css dark row backgrounds) actually win.
              document.body.appendChild(link);
            }
            console.log(`injected ${(stylesheets || []).length} FortiSOAR stylesheets`);
          } catch (e) {
            console.warn("failed to fetch FortiSOAR stylesheets:", e);
          }
        }

        const widgetsRes = await fetch("/_fsr/widgets").then((r) => r.json());
        const widgets = widgetsRes.widgets || [];
        if (widgets.length === 0) {
          setEmpty(
            host,
            "No widgets found in widgets-src/. Add a folder with info.json, view.html, and view.controller.js, then restart the server."
          );
          return;
        }

        // Saved id includes the version (e.g. `fsrPlaybookBuilder-1.0.4`),
        // so after a bump the literal id no longer matches. Fall back to
        // matching by widget name (the stable part before `-<version>`) so
        // refreshes after install land back on the same widget.
        const savedId = localStorage.getItem("harness.widget");
        const savedName = savedId ? savedId.replace(/-\d+(?:\.\d+)*(?:[-.][A-Za-z0-9.]+)?$/, "") : "";
        const currentId =
          (widgets.find((w) => w.id === savedId) ||
            (savedName && widgets.find((w) => w.name === savedName)) ||
            widgets[0]).id;
        for (const w of widgets) {
          const opt = document.createElement("option");
          opt.value = w.id;
          opt.textContent = w.title + " (" + w.id + ")";
          opt.selected = w.id === currentId;
          widgetSelect.appendChild(opt);
        }
        syncWidgetDD();
        const current = widgets.find((w) => w.id === currentId);

        window.__HARNESS_THEME_ID = document.getElementById("harness-theme").value;

        if (loadCssEl.checked) {
          await injectFsrStylesheets(!!(current && current.caps && current.caps.monaco));
        }

        await loadScript("https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js");
        // SOAR's bundle was authored against lodash 3.x (pre-rename) and still
        // calls `_.contains`, `_.findWhere`, `_.pluck`, `_.where`, `_.any`,
        // `_.all`, `_.first`, `_.indexBy`, `_.invoke`, `_.mapObject`. Alias them
        // onto the v4 build so Field/Entity/etc. don't blow up at runtime.
        if (window._ && !window._.contains) {
          window._.mixin({
            contains: window._.includes,
            findWhere: window._.find,
            pluck: function (col, key) { return window._.map(col, key); },
            where: window._.filter,
            any: window._.some,
            all: window._.every,
            first: window._.head,
            indexBy: window._.keyBy,
            invoke: window._.invokeMap,
            mapObject: window._.mapValues,
          });
        }
        // Real SOAR loads DOMPurify as a separate vendor script before the
        // app bundle. Several places in app.unmin.js call DOMPurify.sanitize
        // unconditionally — without a stub the cs-conditional value picker
        // (and a few others) throw "Cannot read properties of undefined
        // (reading 'sanitize')". A pass-through is safe in dev preview;
        // we're not rendering hostile content here.
        if (!window.DOMPurify) {
          window.DOMPurify = {
            sanitize: function (s) { return s == null ? "" : String(s); },
            isValidAttribute: function () { return true; },
            addHook: function () {},
            removeHook: function () {},
            removeHooks: function () {},
            removeAllHooks: function () {},
          };
        }
        // UUID.js (LiosK) is another stripped vendor global. SOAR's utility
        // service does `generateUUID: () => UUID.generate()` (e.g. csGrid /
        // PagedCollection generate row ids on bootstrap), so without it any
        // grid-backed widget — like jsonToGrid — dies at mount with "Cannot
        // read properties of undefined (reading 'generate')". A v4 generator
        // is a faithful stand-in for dev preview.
        if (!window.UUID) {
          window.UUID = {
            generate: function () {
              return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
                var r = (Math.random() * 16) | 0;
                return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
              });
            },
          };
        }
        // Boot-timeline marks consumed by the introspection rig
        // (scripts/introspect.ts → BootTimeline). Each names a milestone in the
        // serial loadScript chain so a render report can attribute boot time to
        // the platform bundles vs the widget vs mount. No-op if performance
        // marks aren't available; purely observational.
        const bootMark = (n) => { try { performance.mark("harness:" + n); } catch (_) {} };
        await loadScript("/_fsr/app.unmin.js");
        bootMark("appUnmin");
        await loadScript("/_fsr/templates.min.js");
        bootMark("templates");
        await loadScript("/harness.module.js");
        bootMark("harnessModule");
        // Lazy-load the heavy editor stacks ONLY for widgets that statically
        // reference them (server-derived caps). Most widgets need neither, so
        // they skip Monaco's ~4 MB / ~150 ms serial preload and the ~0.5 MB
        // rich-text CDN payload entirely. Editor widgets still preload eagerly,
        // matching real SOAR's bootstrap behavior. See server.ts scanCapabilities.
        const caps = (current && current.caps) || { monaco: false, editors: false };
        if (caps.monaco) await preloadMonaco();
        // Await: the old static <head> tags guaranteed these were parsed before
        // bootstrap, so widgets whose controllers touch tinymce/toastui at init
        // (csConditional value cells) don't race. Only editor widgets pay it.
        if (caps.editors) await loadRichTextEditors();
        // Load any widget-local JS under widgetAssets/ (e.g. c3charts'
        // chartService) so widget-defined services register before bootstrap.
        for (const rel of (current.assetScripts || [])) {
          await loadScript("/" + current.id + "/" + rel);
        }
        bootMark("widgetServices");
        await loadScript("/" + current.id + "/view.controller.js");
        bootMark("controller");

        function setRecordHeader(parts) {
          while (recordHeader.firstChild) recordHeader.removeChild(recordHeader.firstChild);
          for (const p of parts) {
            if (typeof p === "string") {
              recordHeader.appendChild(document.createTextNode(p));
            } else {
              const span = document.createElement("span");
              if (p.cls) span.className = p.cls;
              span.textContent = p.text;
              recordHeader.appendChild(span);
            }
          }
        }

        const vpWidthSel = document.getElementById("vp-width");
        vpWidthSel.value = localStorage.getItem("harness.vpWidth") || "880";
        function applyVpWidth() {
          const v = vpWidthSel.value;
          if (frame.classList.contains("ctx-viewpanel")) {
            host.style.maxWidth = v === "full" ? "none" : v + "px";
          } else {
            host.style.maxWidth = "";
          }
        }
        vpWidthSel.addEventListener("change", () => {
          localStorage.setItem("harness.vpWidth", vpWidthSel.value);
          applyVpWidth();
        });

        async function applyContext(ctx) {
          frame.classList.remove("ctx-dashboard", "ctx-viewpanel", "ctx-drawer");
          frame.classList.add("ctx-" + ctx);
          applyVpWidth();
          if (!ctxNeedsRecord(ctx)) {
            recordHeader.style.display = "none";
            setRecordHeader([]);
            return null;
          }
          const m = (modEl.value || "").trim();
          const i = (idEl.value || "").trim();
          recordHeader.style.display = "";
          if (!m || !i) {
            setRecordHeader([
              { cls: "err", text: "no record loaded" },
              " — fill module and id in the toolbar",
            ]);
            return null;
          }
          setRecordHeader(["loading " + m + "/" + i + "…"]);
          try {
            const r = await fetch(HU.recordFetchPath(m, i, true));
            if (!r.ok) throw new Error("HTTP " + r.status);
            const rec = await r.json();
            const label = (rec && (rec.name || rec["@id"] || rec.uuid)) || i;
            setRecordHeader(["record: " + m + " / " + String(label)]);
            return rec;
          } catch (e) {
            setRecordHeader([{ cls: "err", text: "record fetch failed: " + e.message }]);
            return null;
          }
        }

        let currentInjector = null;
        async function mountWidget() {
          const ctx = ctxSel.value;
          // NS1: tell the server which widget is mounting so its hermetic
          // /api/3 record + connector handlers can resolve this widget's
          // fixtures (widgetAssets/fixtures/api3/*). Best-effort; a failure
          // just means the synthesised default scaffold is used.
          try {
            await fetch("/_fsr/active-widget", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ id: current.id }),
            });
          } catch (_) {}
          const record = await applyContext(ctx);

          let savedConfig = null;
          try {
            const raw = localStorage.getItem(HU.configStorageKey(current.id));
            if (raw) savedConfig = JSON.parse(raw);
          } catch (_) {}

          window.__HARNESS_RECORD = record || undefined;
          window.__HARNESS_MODULE = modEl.value || "alerts";
          window.__HARNESS_WIDGET = { name: current.name, version: current.version };
          await loadWidgetTranslations(current);
          window.__HARNESS_CONFIG = HU.mergeConfig(
            // `wid` is the widget instance id SOAR sets on each placement.
            // Some widgets (e.g. dataVisualization) build DOM ids like
            // `eChart-{{config.wid}}` and then `getElementById('eChart-' + wid)`
            // from JS — undefined makes the JS lookup miss the template-rendered
            // element. Stable per-widget value keeps both sides in sync.
            { title: current.title, module: modEl.value || "alerts", defaultTemplate: "", wid: "harness-" + current.id },
            savedConfig
          );
          window.__HARNESS_STATE = HU.stateForContext(ctx, {
            module: modEl.value,
            id: idEl.value,
          });

          if (currentInjector) {
            try { currentInjector.get("$rootScope").$destroy(); } catch (_) {}
          }
          while (host.firstChild) host.removeChild(host.firstChild);

          const ctrlName = HU.deriveControllerName(current.name, current.version);
          renderLintWarnings(current);
          // Machine-readable bootstrap-blocked signal so automated callers
          // (e2e) can fast-fail with the real lint message instead of waiting
          // out a 15s idle timeout that reads like "the box is down". Cleared
          // on every mount attempt; set only when lint blocks the mount below.
          window.__HARNESS_LINT_BLOCKED__ = null;
          const lintErrors = (current.lint && current.lint.errors) || [];
          if (lintErrors.length > 0) {
            window.__HARNESS_LINT_BLOCKED__ = lintErrors.map(function (e) {
              return { code: e.code, message: e.message };
            });
            renderLintBanner(host, current, lintErrors);
            return;
          }
          // Freshly imported / never-configured widgets typically blow up
          // inside the view controller because $scope.config.resource (or
          // an equivalent field the widget reads on init) is undefined.
          // Block bootstrap and prompt the user to open Edit Config first.
          // Once they save anything, savedConfig is non-null and we mount
          // normally — bad saved values are the widget author's problem.
          if (savedConfig == null) {
            renderConfigPrompt(host, current);
            return;
          }
          // Preload SOAR model metadata + translations before bootstrap.
          // modelMetadatasService.getMetadataByModuleType() reads synchronously
          // from localStorage (key: "cs.metadata.<type>"); Entity rejects with
          // METADATA_NOT_FOUND if the entry isn't there. The `translate`
          // filter resolves against window.__HARNESS_TRANSLATIONS — without
          // those, edit-form labels show as raw keys.
          //
          // Both responses are large and rarely change between dev sessions,
          // so we cache them in localStorage with a TTL and use a
          // stale-while-revalidate pattern: hydrate from cache synchronously
          // (fast first paint), then refresh in the background.
          await preloadSoarMetadata();

          const wrap = document.createElement("div");
          wrap.setAttribute("ng-controller", ctrlName);
          const inc = document.createElement("div");
          inc.setAttribute("ng-include", "'/" + current.id + "/view.html'");
          wrap.appendChild(inc);
          host.appendChild(wrap);

          // Open the mount window: a synchronous throw in the widget's
          // controller constructor or its init $digest lands in
          // harness.module.js's $exceptionHandler, which stashes the first one
          // on window.__HARNESS_RENDER_ERROR while __HARNESS_MOUNTING is set.
          // (angular.bootstrap swallows controller-init throws — it never
          // rejects — so a try/catch here would not see them; the global is the
          // reliable channel.)
          window.__HARNESS_RENDER_ERROR = null;
          window.__HARNESS_MOUNTING = true;
          window.__HARNESS_MOUNTING_CTRL = ctrlName;
          // P1: machine-readable render state. beginMount() flips phase to
          // 'mounting'; the active injector is the view's until the edit modal
          // overrides it. Tests/agents read window.__HARNESS_RENDER_STATE and
          // await window.__harness.settle() instead of arbitrary timeouts.
          if (window.__harnessRender) {
            window.__harnessRender.beginMount();
            window.__harnessRender.setInjectorGetter(function () { return currentInjector; });
          }
          currentInjector = angular.bootstrap(wrap, ["cybersponse"]);
          // Close the window after the bootstrap digest settles, then surface
          // any captured render error as a visible panel in #widget-host.
          currentInjector.invoke(["$timeout", function ($timeout) {
            $timeout(function () {
              window.__HARNESS_MOUNTING = false;
              if (window.__HARNESS_RENDER_ERROR) {
                renderRenderError(host, current, window.__HARNESS_RENDER_ERROR);
              }
              // P0/P1: drive the app to quiescence, then record the final phase
              // ('rendered' or 'error'). The settle pump flushes the same
              // deferred ui-grid/$timeout work that otherwise leaves the DOM
              // lagging the model.
              if (window.__harnessRender) {
                window.__harnessRender.settle().then(function () {
                  window.__harnessRender.endMount();
                  // Start the ambient safety digest so post-mount async renders
                  // (e.g. playbook-execution completion → grid data) flush
                  // deterministically, the way the real SOAR app's ambient
                  // digest activity would.
                  window.__harnessRender.startSafetyDigest();
                });
              }
            });
          }]);

          const $rootScope = currentInjector.get("$rootScope");
          window.__harnessApplyTheme = function (id) {
            // Three explicit chrome variants. Previously "navy" silently
            // fell through to dark — picking it had no chrome effect, only
            // changing the SOAR widget theme via $rootScope.theme. Make the
            // chrome reflect the picker for all three so the dropdown is
            // never a no-op.
            document.body.classList.remove("theme-dark", "theme-light", "theme-navy");
            document.body.classList.add("theme-" + (id === "light" ? "light" : id === "navy" ? "navy" : "dark"));
            if ($rootScope.$$phase) {
              $rootScope.theme = { id: id };
            } else {
              $rootScope.$apply(function () { $rootScope.theme = { id: id }; });
            }
          };
        }

        await mountWidget();
        bootMark("mountComplete");

        const themeSelect = document.getElementById("harness-theme");
        themeSelect.addEventListener("change", function () {
          if (window.__harnessApplyTheme) window.__harnessApplyTheme(themeSelect.value);
          // Persist immediately — otherwise the choice only survives if some
          // other action (reload, widget-select change) happens to flush it.
          localStorage.setItem("harness.theme", themeSelect.value);
        });

        // ---------------- Edit-config modal ----------------
        const editBtn = document.getElementById("edit-config");
        const modalBackdrop = document.getElementById("edit-modal-backdrop");
        const modalBody = document.getElementById("edit-modal-body");
        const modalStatus = document.getElementById("edit-modal-status");
        const modalSave = document.getElementById("edit-modal-save");
        const modalCancel = document.getElementById("edit-modal-cancel");
        const modalClose = document.getElementById("edit-modal-close");
        let editInjector = null;
        const jsonArea = document.getElementById("edit-modal-json-area");
        const jsonErr = document.getElementById("edit-modal-json-err");
        const modeFormBtn = document.getElementById("edit-mode-form");
        const modeJsonBtn = document.getElementById("edit-mode-json");
        let editMode = "form"; // "form" | "json"

        function getEditScope() {
          if (!editInjector) return null;
          const wrap = modalBody.firstChild;
          return (wrap && wrap.firstChild && angular.element(wrap.firstChild).scope())
            || (wrap && angular.element(wrap).scope()) || null;
        }

        function switchEditMode(mode) {
          if (mode === editMode) return;
          if (mode === "json") {
            // Snapshot current config from scope (or from localStorage if no injector yet)
            let cfg = {};
            const scope = getEditScope();
            if (scope && scope.config && typeof scope.config === "object") {
              cfg = scope.config;
            } else {
              try {
                const raw = localStorage.getItem(HU.configStorageKey(current.id));
                if (raw) cfg = JSON.parse(raw);
              } catch (_) {}
            }
            jsonArea.value = JSON.stringify(cfg, null, 2);
            // NB: the stylesheet rule for #edit-modal-json-area is `display:none`,
            // so clearing the inline style ("") would fall back to that and keep
            // the textarea hidden — set an explicit visible value instead.
            jsonArea.style.display = "block";
            jsonErr.style.display = "none";
            modalBody.style.display = "none";
          } else {
            jsonArea.style.display = "none";
            jsonErr.style.display = "none";
            modalBody.style.display = "";
          }
          editMode = mode;
          modeFormBtn.classList.toggle("active", mode === "form");
          modeJsonBtn.classList.toggle("active", mode === "json");
        }

        modeFormBtn.addEventListener("click", () => switchEditMode("form"));
        modeJsonBtn.addEventListener("click", () => switchEditMode("json"));

        function closeEditModal() {
          modalBackdrop.classList.remove("open");
          if (editInjector) {
            try { editInjector.get("$rootScope").$destroy(); } catch (_) {}
            editInjector = null;
          }
          while (modalBody.firstChild) modalBody.removeChild(modalBody.firstChild);
          modalStatus.textContent = "";
          jsonArea.style.display = "none";
          jsonErr.style.display = "none";
          modalBody.style.display = "";
          editMode = "form";
          modeFormBtn.classList.add("active");
          modeJsonBtn.classList.remove("active");
        }

        editBtn.addEventListener("click", async () => {
          modalStatus.textContent = "loading edit form…";
          modalBackdrop.classList.add("open");
          try {
            await loadScript("/" + current.id + "/edit.controller.js");
            const editCtrlName = HU.deriveEditControllerName(current.name, current.version);
            const editRegistered = current.editControllers || [];
            if (editRegistered.length > 0 && editRegistered.indexOf(editCtrlName) === -1) {
              while (modalBody.firstChild) modalBody.removeChild(modalBody.firstChild);
              const err = document.createElement("div");
              err.style.cssText = "padding:16px;border:1px solid #c33;background:#fee;color:#900;font-family:monospace;white-space:pre-wrap;";
              err.textContent =
                "Edit controller mismatch.\n\n" +
                "Expected (from info.json version " + current.version + "): " + editCtrlName + "\n" +
                "Registered in edit.controller.js: " + editRegistered.join(", ") + "\n\n" +
                "Either bump the controller name to match the version, or revert info.json.";
              modalBody.appendChild(err);
              modalStatus.textContent = "";
              return;
            }

            let saved = null;
            try {
              const raw = localStorage.getItem(HU.configStorageKey(current.id));
              if (raw) saved = JSON.parse(raw);
            } catch (_) {}
            window.__HARNESS_CONFIG = HU.mergeConfig(window.__HARNESS_CONFIG, saved);
            window.__HARNESS_WIDGET = { name: current.name, version: current.version };
            // Ensure SOAR's static + module locales are merged into
            // __HARNESS_TRANSLATIONS — covers COMPONENTS.FILTER.* and friends
            // pulled in by directives like cs-conditional. Idempotent.
            await preloadSoarMetadata();
            await loadWidgetTranslations(current);

            // Fetch + inline edit.html directly (instead of ng-include). The
            // extra scope ng-include introduces breaks two-way `=ngModel`
            // writes from directives like cs-conditional onto `$parent.config.*`
            // — SOAR mounts the template right inside the controller scope, so
            // the harness needs to too. The first fetch warms the harness's
            // static cache; subsequent opens hit the express.static layer.
            const editHtmlRes = await fetch("/" + current.id + "/edit.html");
            if (!editHtmlRes.ok) throw new Error("edit.html " + editHtmlRes.status);
            const editHtml = await editHtmlRes.text();
            const editWrap = document.createElement("div");
            editWrap.setAttribute("ng-controller", editCtrlName);
            editWrap.innerHTML = editHtml;
            while (modalBody.firstChild) modalBody.removeChild(modalBody.firstChild);
            modalBody.appendChild(editWrap);

            // Same render-error capture as the view mount: a throw in the edit
            // controller's constructor/init $digest goes to $exceptionHandler
            // (which swallows it), leaving a BLANK modal. Surface it instead.
            // This is the harness analog of the "edit.html not displaying"
            // failure on the box — see KB §"edit-modal render errors".
            window.__HARNESS_RENDER_ERROR = null;
            window.__HARNESS_MOUNTING = true;
            window.__HARNESS_MOUNTING_CTRL = editCtrlName;
            editInjector = angular.bootstrap(editWrap, ["cybersponse"]);
            editInjector.invoke(["$timeout", function ($timeout) {
              $timeout(function () {
                window.__HARNESS_MOUNTING = false;
                if (window.__HARNESS_RENDER_ERROR) {
                  renderRenderError(modalBody, current, window.__HARNESS_RENDER_ERROR);
                  modalStatus.textContent = "edit controller failed to render — see panel";
                }
              });
            }]);
            modalStatus.textContent = "";
          } catch (e) {
            modalStatus.textContent = "open failed: " + e.message;
          }
        });

        modalCancel.addEventListener("click", closeEditModal);
        modalClose.addEventListener("click", closeEditModal);
        modalBackdrop.addEventListener("click", (e) => {
          if (e.target === modalBackdrop) closeEditModal();
        });

        modalSave.addEventListener("click", async () => {
          if (!editInjector && editMode === "form") return closeEditModal();
          modalStatus.textContent = "saving…";
          try {
            if (editMode === "json") {
              let parsed;
              try {
                parsed = JSON.parse(jsonArea.value);
              } catch (e) {
                jsonErr.textContent = "Invalid JSON: " + e.message;
                // Same display:none stylesheet default as the textarea — must
                // set an explicit visible value, not "".
                jsonErr.style.display = "block";
                modalStatus.textContent = "";
                return;
              }
              localStorage.setItem(HU.configStorageKey(current.id), JSON.stringify(parsed));
              closeEditModal();
              await mountWidget();
            } else {
              const wrap = modalBody.firstChild;
              const scope =
                (wrap && wrap.firstChild && angular.element(wrap.firstChild).scope()) ||
                (wrap && angular.element(wrap).scope());
              // Honor the widget's own save gating. On the real SOAR box the
              // modal Save submits the edit form (ng-submit="save()"), so a
              // controller that exposes canSave() can refuse an incomplete
              // config (e.g. action-renderer's 4-step wizard). The harness
              // toolbar Save bypassed that path and persisted regardless — let
              // the widget block here too, and call its save() so it can surface
              // its own guidance (toaster / step jump). Widgets without
              // canSave() keep the previous direct-persist behavior.
              if (scope && typeof scope.canSave === "function" && !scope.canSave()) {
                if (typeof scope.save === "function") {
                  try { scope.$apply(function () { scope.save(); }); } catch (_) {}
                }
                modalStatus.textContent = "widget blocked save — complete the required steps first";
                return;
              }
              const cfg = scope && scope.config;
              if (cfg && typeof cfg === "object") {
                localStorage.setItem(HU.configStorageKey(current.id), JSON.stringify(cfg));
              }
              closeEditModal();
              await mountWidget();
            }
          } catch (e) {
            modalStatus.textContent = "save failed: " + e.message;
          }
        });

        // Soft-remount on file change: refresh widget metadata, reload the
        // controller script with a cache-bust, and re-bootstrap. Avoids the
        // full page reload so DevTools state, drawer entries, and scroll
        // position survive an iteration. Only fires for the currently
        // selected widget — other widgets just have their entries refreshed
        // in the metadata cache.
        async function softRemount(reason) {
          try {
            const refreshed = await fetch("/_fsr/widgets").then((r) => r.json());
            const next = (refreshed.widgets || []).find((w) => w.id === current.id || w.name === current.name);
            if (!next) return;
            // Mutate `current` in place so existing closures keep working.
            Object.assign(current, next);
            // Patch the <select> if id changed (version bump while we watched).
            updateWidgetSelectId(widgetSelect.value, current.id);
            await loadScript("/" + current.id + "/view.controller.js?v=" + Date.now());
            await mountWidget();
            console.log("[harness] soft-remount: " + (reason || "change"));
          } catch (e) {
            console.error("[harness] soft-remount failed:", e);
          }
        }

        // SSE wiring: drives soft-remount on file change and pipes proxy log
        // entries into the debug drawer. EventSource auto-reconnects, so we
        // don't need to handle disconnects explicitly.
        try {
          const es = new EventSource("/_fsr/events");
          let remountTimer = null;
          es.addEventListener("message", function (ev) {
            let m;
            try { m = JSON.parse(ev.data); } catch (_) { return; }
            if (m.type === "widget-change") {
              if (m.id === current.id || m.oldId === current.id || m.id.split("-")[0] === current.name) {
                clearTimeout(remountTimer);
                remountTimer = setTimeout(() => softRemount(m.file), 120);
              }
            } else if (m.type === "harness-reload") {
              clearTimeout(remountTimer);
              remountTimer = setTimeout(() => softRemount("harness.module.js"), 120);
            } else if (m.type === "proxy") {
              if (window.__harnessProxyEvent) window.__harnessProxyEvent(m.entry);
            } else if (m.type === "proxy-clear") {
              if (window.__harnessClearNetwork) window.__harnessClearNetwork();
            } else if (m.type === "verbose") {
              if (window.__harnessSetVerboseUI) window.__harnessSetVerboseUI(m.verbose);
            } else if (m.type === "hello") {
              if (window.__harnessSetVerboseUI) window.__harnessSetVerboseUI(m.verbose);
            }
          });
          es.addEventListener("error", () => { /* EventSource reconnects */ });
        } catch (e) {
          console.warn("[harness] SSE unavailable:", e && e.message);
        }
        if (window.__harnessHydrateProxy) window.__harnessHydrateProxy();

        // Drawer close button — hides the drawer overlay so the records grid
        // (and any controls it covers) are reachable again. Re-show by
        // changing context away from drawer and back, or by reselecting a
        // widget.
        document.getElementById("harness-drawer-close").addEventListener("click", () => {
          frame.classList.add("drawer-hidden");
        });
        document.getElementById("harness-drawer-open").addEventListener("click", () => {
          frame.classList.remove("drawer-hidden");
        });
        ctxSel.addEventListener("change", () => frame.classList.remove("drawer-hidden"));
        widgetSelect.addEventListener("change", () => frame.classList.remove("drawer-hidden"));

        // Re-mount when the user changes context or record without reloading.
        ctxSel.addEventListener("change", () => mountWidget().catch(console.error));
        document.getElementById("vp-module").addEventListener("change", () => {
          if (ctxNeedsRecord(ctxSel.value)) mountWidget().catch(console.error);
        });
        document.getElementById("vp-id").addEventListener("change", () => {
          if (ctxNeedsRecord(ctxSel.value)) mountWidget().catch(console.error);
        });
      })().catch((e) => {
        setEmpty(
          document.getElementById("widget-host"),
          "harness boot failed: " + (e && e.message ? e.message : String(e))
        );
        console.error(e);
      });
    </script>
  </body>
</html>
